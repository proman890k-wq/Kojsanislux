name: Post to Telegram

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 11 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Опубликовать следующий пост
        run: node post.js
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          OWNER_ID: ${{ secrets.OWNER_ID }}

      - name: Сохранить обновлённую очередь
        run: |
          git config user.name "kozhaniy-bot"
          git config user.email "actions@github.com"
          git add posts.json
          git diff --staged --quiet || git commit -m "Опубликован пост, очередь обновлена"
          git push
